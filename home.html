<body class="bg-gray-50 font-sans text-gray-800">
 <nav class="bg-white border-b border-gray-200 py-4 px-6 md:px-20 flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center space-x-2">
            <img width="40" src="./assets/github-logo.png" alt="">
            <span class="text-xl font-bold tracking-tight">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center mt-4 md:mt-0">
            <div class="relative ">
                <input id="search-input" type="text" placeholder="Search issues..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
            </div>
            <button id="search-btn" class="bg-indigo-600 text-white py-1 px-2 md:py-2 md:6 rounded-lg text-sm md:text-base md:font-medium hover:bg-indigo-700 transition">
                + New Issue
            </button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto mt-8 px-6 md:px-20">
        <div class="flex  space-x-2 mb-8">
            <button onclick="showCard('btn-all')" id="btn-all" class="active-tab bg-white border border-gray-300 text-gray-600 px-6 py-2 rounded-md hover:bg-gray-100 transition">All</button>
            <button onclick="showCard('btn-open')" id="btn-open" class="bg-white border border-gray-300 text-gray-600 px-6 py-2 rounded-md hover:bg-gray-100 transition">Open</button>
            <button onclick="showCard('btn-closed')" id="btn-closed" class="bg-white border border-gray-300 text-gray-600 px-6 py-2 rounded-md hover:bg-gray-100 transition">Closed</button>
        </div>

        <div class="bg-white border border-gray-200 rounded-xl py-2 px-6 flex flex-col md:flex-row justify-between items-center shadow-sm mb-10">
            <div class="flex items-center space-x-5">
                <div class="bg-indigo-100 p-3 rounded-full">
                    <img src="./assets/Aperture.png" alt="">


                </div>
                <div>
                    <h1 id="issue-count" class="text-2xl font-bold">0 Issues</h1>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex space-x-6 font-medium mt-4 md:mt-0">
                <div class="flex items-center space-x-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    <span>Open</span>
                </div>
                <div class="flex items-center space-x-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    <span>Closed</span>
                </div>
            </div>
        </div>
        <div id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-bars loading-xl"></span>
    </div>
        <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-20">

        </div>
    </div>
