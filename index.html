<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <!-- font awesome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  <!-- tailwind+daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style/style.css" />
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <nav class="bg-white border-b border-gray-200 py-4 px-6 md:px-20 flex flex-col md:flex-row justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa-brands fa-github text-3xl"></i>
            <span class="text-xl font-bold tracking-tight">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center mt-4 md:mt-0">
            <div class="relative ">
                <input id="search-input" type="text" placeholder="Search issues..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
            </div>
            <button class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
                + New Issue
            </button>
        </div>
    </nav>

</body>
</html>
