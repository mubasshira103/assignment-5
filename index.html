<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-orange-50 flex items-center justify-center min-h-screen p-2">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-4">
            <i class="fa-brands fa-github text-7xl mb-2"></i>
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <form class="space-y-3">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input id="userName" required type="text" placeholder="Enter Username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50">
                <p class="text-[10px] text-indigo-700 mt-1 font-bold">Default: admin</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input id="pass" required type="password" placeholder="Enter Password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50">
                <p class="text-[10px] text-indigo-700 mt-1 font-bold">Default: admin123</p>
            </div>

            <button id="login-btn" type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-full font-bold hover:bg-indigo-700 transition duration-300 shadow-lg shadow-indigo-200">
                Login
            </button>
        </form>

        <div class="relative my-4 text-center">
            <hr class="border-gray-200">
            <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-3 text-xs text-gray-400 font-bold">OR</span>
        </div>

        <div class="bg-blue-50/50 border border-blue-100 p-3 rounded-xl text-center">
            <p class="text-xs text-gray-400 font-bold mb-2">Demo Credentials:</p>
            <p class="text-sm font-bold text-gray-700">Username: <span class="text-indigo-600">admin</span></p>
            <p class="text-sm font-bold text-gray-700">Password: <span class="text-indigo-600">admin123</span></p>
        </div>
    </div>
    
  <script src="./index.js"></script>
</body>
</html>
